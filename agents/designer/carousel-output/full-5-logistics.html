<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; background: #000;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 100px 80px; position: relative;
    }
    .star { position: absolute; top: 60px; left: 60px; font-size: 48px; color: #D4A942; font-weight: 900; }
    .title { font-family: 'Montserrat', sans-serif; font-size: 56px; font-weight: 900;
      color: #fff; margin-bottom: 50px; line-height: 1.2; }
    .number { font-family: 'Montserrat', sans-serif; font-size: 140px; font-weight: 900;
      color: #D4A942; letter-spacing: -4px; line-height: 1; margin-bottom: 60px; }
    .list { margin-top: 40px; }
    .list-item { display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
      font-size: 32px; color: #fff; }
    .bullet { color: #D4A942; font-size: 40px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="star">✱</div>
  <div class="title">Логистика съедает<br>ещё 15%</div>
  <div class="number">15%</div>
  <div class="list">
    <div class="list-item"><span class="bullet">•</span> Доставка на склад МП</div>
    <div class="list-item"><span class="bullet">•</span> Хранение</div>
    <div class="list-item"><span class="bullet">•</span> Доставка покупателю</div>
    <div class="list-item"><span class="bullet">•</span> Упаковка</div>
  </div>
</body>
</html>
