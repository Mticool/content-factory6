<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Test Slide 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: #000000;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 100px 80px;
      position: relative;
    }
    .star {
      position: absolute;
      top: 60px;
      left: 60px;
      font-size: 48px;
      color: #D4A942;
      font-weight: 900;
    }
    .title {
      font-family: 'Montserrat', sans-serif;
      font-size: 56px;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 80px;
      line-height: 1.2;
      letter-spacing: -1px;
    }
    .stat-block {
      width: 100%;
      margin-bottom: 40px;
    }
    .stat {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 15px;
    }
    .stat-number {
      font-family: 'Montserrat', sans-serif;
      font-size: 120px;
      font-weight: 900;
      color: #D4A942;
      letter-spacing: -3px;
      line-height: 1;
    }
    .stat-unit {
      font-size: 48px;
      color: #D4A942;
      font-weight: 700;
    }
    .stat-label {
      font-size: 32px;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
      margin-left: 5px;
    }
    .visual-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }
    .visual-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #D4A942 0%, #E5A836 100%);
      border-radius: 6px;
      width: 47%;
    }
    .insight {
      font-size: 36px;
      color: #ffffff;
      line-height: 1.4;
      margin-top: 60px;
      font-weight: 500;
    }
    .insight span {
      color: #D4A942;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="star">✱</div>
  
  <div class="title">
    Реальная стоимость<br>
    продажи на Ozon
  </div>
  
  <div class="stat-block">
    <div class="stat">
      <div class="stat-number">47</div>
      <div class="stat-unit">%</div>
    </div>
    <div class="stat-label">комиссия маркетплейса</div>
    <div class="visual-bar">
      <div class="visual-bar-fill"></div>
    </div>
  </div>
  
  <div class="insight">
    Почти <span>половина</span> выручки<br>
    уходит ДО того, как ты<br>
    покроешь остальные расходы
  </div>
</body>
</html>
