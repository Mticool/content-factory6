<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Слайд 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; background: #000000;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 100px 80px; position: relative;
    }
    .star { position: absolute; top: 60px; left: 60px; font-size: 48px; color: #D4A942; font-weight: 900; }
    .big-number { font-family: 'Montserrat', sans-serif; font-size: 140px; font-weight: 900;
      color: #D4A942; letter-spacing: -4px; margin-bottom: 40px; line-height: 1; }
    .title { font-family: 'Montserrat', sans-serif; font-size: 64px; font-weight: 900;
      color: #ffffff; line-height: 1.2; margin-bottom: 60px; letter-spacing: -1px; }
    .subtitle { font-size: 38px; color: rgba(255,255,255,0.8); line-height: 1.4; font-weight: 500; }
    .swipe { font-size: 32px; color: rgba(255,255,255,0.6); margin-top: 80px; }
  </style>
</head>
<body>
  <div class="star">✱</div>
  <div class="big-number">97%</div>
  <div class="title">Селлеров не знают<br>свою реальную<br>прибыль</div>
  <div class="subtitle">И работают в минус,<br>думая что в плюсе</div>
  <div class="swipe">→ свайп</div>
</body>
</html>
