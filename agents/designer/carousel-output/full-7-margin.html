<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; background: #000;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 100px 80px; position: relative;
    }
    .star { position: absolute; top: 60px; left: 60px; font-size: 48px; color: #D4A942; font-weight: 900; }
    .label { font-size: 48px; color: rgba(255,255,255,0.8); margin-bottom: 30px; font-weight: 600; }
    .number { font-family: 'Montserrat', sans-serif; font-size: 200px; font-weight: 900;
      color: #D4A942; letter-spacing: -6px; line-height: 1; margin-bottom: 80px; }
    .text { font-size: 42px; color: #fff; line-height: 1.5; font-weight: 500; }
    .text span { color: #D4A942; font-weight: 700; }
  </style>
</head>
<body>
  <div class="star">✱</div>
  <div class="label">Твоя реальная маржа:</div>
  <div class="number">3%</div>
  <div class="text">А ты думал что <span>30%</span>,<br>потому что не считал<br>все расходы</div>
</body>
</html>
