<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Слайд 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: #E8E5DE;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 100px 80px;
      position: relative;
    }
    .star {
      position: absolute;
      top: 60px;
      left: 60px;
      font-size: 48px;
      color: #D4A942;
      font-weight: 900;
    }
    .timeline {
      font-size: 38px;
      color: #000000;
      line-height: 1.6;
      font-weight: 500;
      margin-bottom: 80px;
    }
    .reality {
      font-family: 'Montserrat', sans-serif;
      font-size: 64px;
      font-weight: 900;
      color: #D4A942;
      margin-bottom: 40px;
      line-height: 1.2;
      letter-spacing: -1px;
    }
    .outcome {
      font-size: 42px;
      color: #000000;
      line-height: 1.5;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="star">✱</div>
  
  <div class="timeline">
    Селлер работал 3 года<br><br>
    Думал что в плюсе<br>
    Нанимал людей<br>
    Расширялся
  </div>
  
  <div class="reality">
    Потом сел считать:<br>
    Минус 200К<br>
    каждый месяц
  </div>
  
  <div class="outcome">
    Узнал когда поздно.<br>
    Закрыл магазин.
  </div>
</body>
</html>
