<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Слайд 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: #000000;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 80px;
      text-align: center;
    }
    .warning {
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      color: #D4A942;
      margin-bottom: 60px;
      line-height: 1.2;
      letter-spacing: -2px;
    }
    .offer {
      font-size: 48px;
      color: #ffffff;
      font-weight: 600;
      margin-bottom: 80px;
      line-height: 1.4;
    }
    .benefits {
      margin-bottom: 80px;
    }
    .benefit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      font-size: 36px;
      color: #ffffff;
    }
    .benefit .check {
      color: #D4A942;
      font-weight: 700;
      font-size: 40px;
    }
    .link {
      font-family: 'Montserrat', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: #D4A942;
      letter-spacing: -1px;
    }
  </style>
</head>
<body>
  <div class="warning">
    НЕ ПОВТОРИ<br>
    ЕГО ОШИБКУ
  </div>
  
  <div class="offer">
    Узнай реальную прибыль<br>
    за 30 секунд
  </div>
  
  <div class="benefits">
    <div class="benefit"><span class="check">✓</span> Без API</div>
    <div class="benefit"><span class="check">✓</span> Без таблиц</div>
    <div class="benefit"><span class="check">✓</span> Первая проверка БЕСПЛАТНО</div>
  </div>
  
  <div class="link">ozon-check.ru</div>
</body>
</html>
