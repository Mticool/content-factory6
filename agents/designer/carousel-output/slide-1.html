<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Слайд 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: #000000;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
    }
    .star {
      position: absolute;
      top: 60px;
      left: 60px;
      font-size: 48px;
      color: #D4A942;
      font-weight: 900;
    }
    .numbers {
      text-align: center;
      margin-bottom: 80px;
    }
    .revenue {
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 10px;
      letter-spacing: -2px;
    }
    .profit {
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      color: #D4A942;
      letter-spacing: -2px;
    }
    .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      line-height: 1.3;
      max-width: 800px;
      margin-bottom: 40px;
    }
    .swipe {
      font-size: 32px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="star">✱</div>
  
  <div class="numbers">
    <div class="revenue">ОБОРОТ 5 МЛН</div>
    <div class="profit">ПРИБЫЛЬ −200К</div>
  </div>
  
  <div class="subtitle">
    История селлера,<br>
    который узнал правду<br>
    слишком поздно
  </div>
  
  <div class="swipe">→ свайп</div>
</body>
</html>
