<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Слайд 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      background: #F5F5F5;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 100px 80px;
      position: relative;
    }
    .star {
      position: absolute;
      top: 60px;
      left: 60px;
      font-size: 48px;
      color: #D4A942;
      font-weight: 900;
    }
    .big-number {
      font-family: 'Montserrat', sans-serif;
      font-size: 140px;
      font-weight: 900;
      color: #000000;
      line-height: 1;
      margin-bottom: 40px;
      letter-spacing: -4px;
    }
    .label {
      font-size: 32px;
      color: #000000;
      font-weight: 500;
      margin-bottom: 80px;
    }
    .question {
      font-family: 'Montserrat', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #000000;
      line-height: 1.3;
      margin-bottom: 60px;
    }
    .insight {
      font-size: 36px;
      color: #000000;
      line-height: 1.4;
      font-weight: 400;
    }
    .insight span {
      color: #D4A942;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="star">✱</div>
  
  <div class="big-number">700 000</div>
  <div class="label">селлеров на маркетплейсах</div>
  
  <div class="question">
    Сколько работают<br>
    в минус, не зная<br>
    об этом?
  </div>
  
  <div class="insight">
    Большинство смотрят<br>
    на <span>ОБОРОТ</span>, а не на <span>МАРЖУ</span>
  </div>
</body>
</html>
