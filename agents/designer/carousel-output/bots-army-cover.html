<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Армия ботов</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; background: #000000;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    
    /* Фон с тонкими линиями связи */
    .network-bg {
      position: absolute; width: 100%; height: 100%;
      opacity: 0.1;
    }
    .connection-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, #D4A942, transparent);
      transform-origin: left center;
    }
    
    /* Главный бот в центре */
    .main-bot {
      position: relative;
      width: 220px; height: 220px;
      background: linear-gradient(135deg, #D4A942 0%, #E5A836 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 80px rgba(212, 169, 66, 0.5);
      z-index: 10;
      margin-bottom: 40px;
    }
    .main-bot .star {
      font-size: 80px;
      color: #000;
      font-weight: 900;
    }
    .main-bot-label {
      position: absolute;
      bottom: -50px;
      font-size: 20px;
      color: #D4A942;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    /* Круг с агентами */
    .agents-circle {
      position: absolute;
      width: 700px; height: 700px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    
    /* Агент-бот */
    .agent {
      position: absolute;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(212, 169, 66, 0.3);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .agent-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .agent-name {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      text-align: center;
    }
    
    /* Позиции агентов по кругу */
    .agent:nth-child(1) { top: 0; left: 50%; transform: translate(-50%, 0); }
    .agent:nth-child(2) { top: 15%; right: 10%; }
    .agent:nth-child(3) { top: 50%; right: 0; transform: translate(0, -50%); }
    .agent:nth-child(4) { bottom: 15%; right: 10%; }
    .agent:nth-child(5) { bottom: 0; left: 50%; transform: translate(-50%, 0); }
    .agent:nth-child(6) { bottom: 15%; left: 10%; }
    .agent:nth-child(7) { top: 50%; left: 0; transform: translate(0, -50%); }
    .agent:nth-child(8) { top: 15%; left: 10%; }
    
    /* Заголовок */
    .title {
      position: absolute;
      top: 60px;
      font-family: 'Montserrat', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -1px;
    }
    .title .highlight {
      color: #D4A942;
    }
    
    /* Подпись внизу */
    .subtitle {
      position: absolute;
      bottom: 60px;
      font-size: 24px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      font-weight: 500;
    }
  </style>
</head>
<body>
  
  <!-- Заголовок -->
  <div class="title">
    Я построил<br>
    <span class="highlight">армию ботов</span>
  </div>
  
  <!-- Главный бот -->
  <div class="main-bot">
    <div class="star">✱</div>
    <div class="main-bot-label">Дирижёр</div>
  </div>
  
  <!-- Агенты по кругу -->
  <div class="agents-circle">
    <div class="agent">
      <div class="agent-icon">📊</div>
      <div class="agent-name">Аналитик</div>
    </div>
    <div class="agent">
      <div class="agent-icon">🎨</div>
      <div class="agent-name">Дизайнер</div>
    </div>
    <div class="agent">
      <div class="agent-icon">🎬</div>
      <div class="agent-name">Видео</div>
    </div>
    <div class="agent">
      <div class="agent-icon">✍️</div>
      <div class="agent-name">Копирайтер</div>
    </div>
    <div class="agent">
      <div class="agent-icon">📈</div>
      <div class="agent-name">Стратег</div>
    </div>
    <div class="agent">
      <div class="agent-icon">🔍</div>
      <div class="agent-name">Researcher</div>
    </div>
    <div class="agent">
      <div class="agent-icon">💻</div>
      <div class="agent-name">Developer</div>
    </div>
    <div class="agent">
      <div class="agent-icon">🎯</div>
      <div class="agent-name">Маркетолог</div>
    </div>
  </div>
  
  <!-- Подпись -->
  <div class="subtitle">
    И она уже работает
  </div>
  
</body>
</html>
