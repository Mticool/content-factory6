<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; background: #000;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 100px 80px; position: relative;
    }
    .star { position: absolute; top: 60px; left: 60px; font-size: 48px; color: #D4A942; font-weight: 900; }
    .title { font-family: 'Montserrat', sans-serif; font-size: 56px; font-weight: 900;
      color: #fff; margin-bottom: 80px; line-height: 1.2; letter-spacing: -1px; }
    .stat { display: flex; align-items: baseline; gap: 20px; margin-bottom: 20px; }
    .stat-number { font-family: 'Montserrat', sans-serif; font-size: 140px; font-weight: 900;
      color: #D4A942; letter-spacing: -4px; line-height: 1; }
    .stat-unit { font-size: 56px; color: #D4A942; font-weight: 700; }
    .stat-label { font-size: 36px; color: rgba(255,255,255,0.8); font-weight: 500; margin-top: 10px; }
    .bar { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 7px;
      margin: 30px 0 60px 0; position: relative; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #D4A942 0%, #E5A836 100%);
      border-radius: 7px; width: 47%; }
    .insight { font-size: 38px; color: #fff; line-height: 1.5; font-weight: 500; }
    .insight span { color: #D4A942; font-weight: 700; }
  </style>
</head>
<body>
  <div class="star">✱</div>
  <div class="title">Первый удар —<br>комиссия МП</div>
  <div class="stat">
    <div class="stat-number">47</div>
    <div class="stat-unit">%</div>
  </div>
  <div class="stat-label">с каждой продажи</div>
  <div class="bar"><div class="bar-fill"></div></div>
  <div class="insight">Почти <span>половина</span> выручки<br>уходит ДО остальных<br>расходов</div>
</body>
</html>
