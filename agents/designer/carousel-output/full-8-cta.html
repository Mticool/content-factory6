<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; background: #F5F5F5;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 100px 80px; position: relative;
    }
    .star { position: absolute; top: 60px; left: 60px; font-size: 48px; color: #D4A942; font-weight: 900; }
    .title { font-family: 'Montserrat', sans-serif; font-size: 64px; font-weight: 900;
      color: #000; margin-bottom: 60px; line-height: 1.2; letter-spacing: -1px; }
    .title span { color: #D4A942; }
    .subtitle { font-size: 42px; color: #000; line-height: 1.4; margin-bottom: 70px; font-weight: 600; }
    .benefits { margin-bottom: 70px; }
    .benefit { display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
      font-size: 34px; color: #000; }
    .check { color: #D4A942; font-weight: 700; font-size: 38px; }
    .link { font-family: 'Montserrat', sans-serif; font-size: 52px; font-weight: 700;
      color: #D4A942; letter-spacing: -1px; }
  </style>
</head>
<body>
  <div class="star">✱</div>
  <div class="title">Узнай <span>реальную<br>прибыль</span> за 30 сек</div>
  <div class="subtitle">OzonCheck считает<br>всё автоматически</div>
  <div class="benefits">
    <div class="benefit"><span class="check">✓</span> Без API</div>
    <div class="benefit"><span class="check">✓</span> Без таблиц</div>
    <div class="benefit"><span class="check">✓</span> Первая проверка БЕСПЛАТНО</div>
  </div>
  <div class="link">ozon-check.ru</div>
</body>
</html>
