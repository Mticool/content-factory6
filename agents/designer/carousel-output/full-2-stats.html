<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px; background: #F5F5F5;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 100px 80px; position: relative;
    }
    .star { position: absolute; top: 60px; left: 60px; font-size: 48px; color: #D4A942; font-weight: 900; }
    .label { font-size: 32px; color: #000; font-weight: 500; margin-bottom: 30px; }
    .number { font-family: 'Montserrat', sans-serif; font-size: 160px; font-weight: 900;
      color: #000; letter-spacing: -5px; line-height: 1; margin-bottom: 40px; }
    .highlight { color: #D4A942; }
    .text { font-size: 42px; color: #000; line-height: 1.4; font-weight: 600; }
  </style>
</head>
<body>
  <div class="star">✱</div>
  <div class="label">селлеров на маркетплейсах</div>
  <div class="number">700<span class="highlight">K</span></div>
  <div class="text">Большинство смотрят<br>на ОБОРОТ,<br>а считать надо МАРЖУ</div>
</body>
</html>
